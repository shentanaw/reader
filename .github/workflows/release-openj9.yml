name: Publish Docker Multi-Platform Images Using Openj9

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  docker:
    # 【修改 1】删除了原有的 if: github.repository == 'hectorqin/reader' 限制，允许在你的仓库触发
    runs-on: ubuntu-latest
    
    # 【修改 2】增加 GHCR 必须的写入权限
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4 # 升级了 Action 版本以获得更好稳定性

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '14'

      - name: Build web
        run: cd web && npm install && npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin' # adopt-openj9 在新版中已被迁移合并，推荐 temurin 或 zulu
          java-version: '8'
          cache: 'gradle'

      - name: Build Java
        run: |
          mv ./web/dist ./src/main/resources/web
          rm -f src/main/java/com/htmake/reader/ReaderUIApplication.kt
          gradle -b cli.gradle assemble --info
          mv ./build/libs/*.jar ./reader.jar

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          # 【修改 3】将镜像源改为 GitHub 容器托管，自动匹配你的用户名/仓库名
          images: |
            ghcr.io/${{ github.repository }}
          flavor: |
            latest=false
            prefix=openj9-,onlatest=true
            suffix=
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ !contains(github.ref, 'beta') }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 【修改 4】将登录目标由 DockerHub 改为 GitHub GHCR，无需手动配置任何 Secret
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./.github/workflows/Openj9-Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 保持原项目的多架构支持：AMD64, ARM64 以及其他架构
          platforms: |
            linux/amd64
            linux/arm64/v8
            linux/ppc64le
            linux/s390x
          cache-from: type=gha
          cache-to: type=gha,mode=max
